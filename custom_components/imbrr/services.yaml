build_outflow_model:
  name: Build outflow model
  description: >
    Fit the pressure-tank model from historical readings so the estimated
    Outflow rate sensor (flow out of the tank / household draw) can work.
    Safe to re-run to refresh the fit.
  fields:
    days:
      name: Days
      description: How many days of history to fit from.
      required: false
      default: 30
      example: 30
      selector:
        number:
          min: 1
          max: 365
          unit_of_measurement: days
          mode: box

import_history:
  name: Import history
  description: >
    Re-download raw readings from the imbrr cloud and re-import them as
    hourly statistics onto the sensor entities. Idempotent and safe to run
    repeatedly; it does not change the lifetime water total. Use it to
    recover history that predates the automatic one-time backfill.
  fields:
    days:
      name: Days
      description: >
        How many days back to re-import. Defaults to the integration's
        configured backfill window.
      required: false
      example: 30
      selector:
        number:
          min: 1
          max: 365
          unit_of_measurement: days
          mode: box
