# =============================================================================
# imbrr — example well & water monitoring dashboard (two views)
# =============================================================================
#
#   View 1 "Well": live status + short-term (48 h) trends.
#   View 2 "Long-term": daily / weekly / monthly aggregates.
#
# PREREQUISITES
#   Both views need the Plotly Graph Card (HACS → Frontend → "Plotly Graph
#   Card" by dbuezas) — View 2 uses it for the reversed-axis depth bars and
#   the built-in Statistics Graph card for the rest. The glance / gauge /
#   entities / conditional cards are built in.
#   The one optional helper (for pump-cycle counts) is documented above View 2.
#
# ENTITY NAMES
#   imbrr entity ids are fixed and independent of the device's display name:
#   sensor.imbrr_depth_to_water, sensor.imbrr_outflow_rate_estimated, etc. — so this
#   dashboard works as-is, no find/replace needed. (Only if you have more than
#   one imbrr device do the second device's shared metrics get an "_2" suffix;
#   open any imbrr entity → settings to see its exact entity_id.)
#
# UNITS
#   Gauge ranges/severity below assume the device's native US units
#   (ft, psi, gpm, °F). If your Home Assistant displays metric, either adjust
#   the numbers, or override each entity's unit (entity settings → unit of
#   measurement) back to the US unit.
#
# HOW TO USE
#   Settings → Dashboards → (new dashboard) → ⋮ → Edit in YAML, and paste the
#   "views:" block below. Or add the single view to an existing dashboard.
# =============================================================================

views:
  - title: Well
    path: well
    icon: mdi:water-well
    type: sections
    max_columns: 2
    sections:
      # ----------------------------------------------------------------- Status
      - type: grid
        cards:
          - type: heading
            heading: Well & water status
            heading_style: title
            icon: mdi:water-well

          # Live "is it pumping right now" banner (MQTT-driven, near-instant).
          - type: conditional
            conditions:
              - entity: binary_sensor.imbrr_flow_active
                state: "on"
            card:
              type: markdown
              content: >
                ## 💧 Pump running — {{ states('sensor.imbrr_flow_rate') }}
                {{ state_attr('sensor.imbrr_flow_rate','unit_of_measurement') }}
                &nbsp;·&nbsp; {{ states('sensor.imbrr_current_event_water') }}
                {{ state_attr('sensor.imbrr_current_event_water','unit_of_measurement') }}
                this event

          # At-a-glance status with explicit icons.
          - type: glance
            title: Now
            columns: 3
            state_color: true
            show_state: true
            entities:
              - entity: binary_sensor.imbrr_flow_active
                name: Pumping
                icon: mdi:water-pump
              - entity: sensor.imbrr_pressure
                name: Pressure
                icon: mdi:gauge
              - entity: sensor.imbrr_flow_rate
                name: Flow
                icon: mdi:water
              - entity: sensor.imbrr_depth_to_water
                name: Depth
                icon: mdi:arrow-down-bold-circle
              - entity: sensor.imbrr_water_temperature
                name: Temp
                icon: mdi:thermometer-water
              - entity: sensor.imbrr_current_event_water
                name: This event
                icon: mdi:cup-water
              # Estimated flow OUT of the pressure tank (household draw).
              # Reads unknown until you run the imbrr.build_outflow_model action.
              - entity: sensor.imbrr_outflow_rate_estimated
                name: Out (est)
                icon: mdi:water-minus

          # Gauges. Ranges assume ft / psi / gpm (see UNITS note above).
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.imbrr_depth_to_water
                name: Depth to water
                needle: true
                min: 0
                max: 180
                severity:
                  green: 0
                  yellow: 120
                  red: 150
              - type: gauge
                entity: sensor.imbrr_pressure
                name: Pressure
                needle: true
                min: 0
                max: 80
                severity:
                  red: 0
                  green: 40
                  yellow: 70
              - type: gauge
                entity: sensor.imbrr_flow_rate
                name: Flow rate
                needle: true
                min: 0
                max: 10
              - type: gauge
                entity: sensor.imbrr_outflow_rate_estimated
                name: Outflow (est)
                needle: true
                min: 0
                max: 15

      # -------------------------------------------------------- History & trends
      - type: grid
        cards:
          - type: heading
            heading: History & trends
            heading_style: title
            icon: mdi:chart-line

          # Coupled water depth (left axis) and use / flow rate (right axis).
          - type: custom:plotly-graph
            title: Water depth & use
            hours_to_show: 48
            refresh_interval: 60
            entities:
              - entity: sensor.imbrr_depth_to_water
                name: Depth to water
                statistic: mean
                period: 5minute
                yaxis: y1
                line:
                  color: "#4e73df"
                  width: 2
              - entity: sensor.imbrr_flow_rate
                name: Peak flow
                statistic: max
                period: 5minute
                yaxis: y2
                fill: tozeroy
                fillcolor: "rgba(28,200,138,0.25)"
                line:
                  color: "#1cc88a"
                  width: 1
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font:
                color: "#e1e1e1"
              margin: { t: 30, l: 52, r: 52, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              # Depth axis is reversed so the water surface reads intuitively:
              # 0 (surface) at the top, deeper water lower down.
              yaxis:
                title: Depth
                autorange: reversed
                gridcolor: "rgba(255,255,255,0.08)"
              yaxis2:
                title: Flow
                overlaying: y
                side: right
                showgrid: false

          # Pressure through time (5-minute long-term statistics = includes backfill).
          - type: custom:plotly-graph
            title: Pressure history
            hours_to_show: 48
            refresh_interval: 60
            entities:
              - entity: sensor.imbrr_pressure
                name: Pressure
                statistic: mean
                period: 5minute
                line:
                  color: "#fd7e14"
                  width: 2
                fill: tozeroy
                fillcolor: "rgba(253,126,20,0.15)"
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font:
                color: "#e1e1e1"
              margin: { t: 30, l: 52, r: 52, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis: { gridcolor: "rgba(255,255,255,0.08)" }

          # Cumulative water use, integrated from flow in-card and reset each
          # midnight. No helper needed — the fn filter sums flow * elapsed
          # minutes (flow is per-minute, so the result is in the flow sensor's
          # volume unit) and zeroes the running total when the calendar day
          # changes. Over a week you get one sawtooth per day.
          - type: custom:plotly-graph
            title: Water use per day (cumulative, resets at midnight)
            hours_to_show: 48
            refresh_interval: 300
            entities:
              - entity: sensor.imbrr_flow_rate
                name: Cumulative water
                fill: tozeroy
                fillcolor: "rgba(54,185,204,0.2)"
                line:
                  color: "#36b9cc"
                  width: 2
                filters:
                  - resample: 5m
                  - fn: |
                      ({ xs, ys }) => {
                        let cumulative = 0;
                        let last = null;
                        const out = [];
                        for (let i = 0; i < xs.length; i++) {
                          const t = new Date(xs[i]);
                          if (last && t.getDate() !== last.getDate()) cumulative = 0;
                          const dtMin = last ? (t - last) / 60000 : 0;
                          cumulative += (ys[i] || 0) * dtMin;
                          out.push(cumulative);
                          last = t;
                        }
                        return { xs, ys: out };
                      }
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font:
                color: "#e1e1e1"
              margin: { t: 30, l: 52, r: 20, b: 40 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis: { title: Volume, gridcolor: "rgba(255,255,255,0.08)" }

          # Outflow-model coefficient k: each day's fit as a scatter point, with
          # a 7-day moving average line. Pan the x-axis to examine earlier days.
          # (Backfilled ~30 days by the integration; a fresh point lands daily.)
          - type: custom:plotly-graph
            title: Outflow model k — daily fit & 7-day average
            hours_to_show: 720
            refresh_interval: 3600
            entities:
              - entity: sensor.imbrr_outflow_k
                name: Daily fit
                statistic: mean
                period: day
                mode: markers
                marker: { size: 6, color: "rgba(78,115,223,0.85)" }
              - entity: sensor.imbrr_outflow_k
                name: 7-day average
                statistic: mean
                period: day
                line: { color: "#1cc88a", width: 2 }
                filters:
                  - fn: |
                      ({ xs, ys }) => {
                        const w = 7;
                        const out = [];
                        for (let i = 0; i < ys.length; i++) {
                          const s = ys
                            .slice(Math.max(0, i - w + 1), i + 1)
                            .filter((v) => v != null);
                          out.push(s.length ? s.reduce((a, b) => a + b, 0) / s.length : null);
                        }
                        return { xs, ys: out };
                      }
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font:
                color: "#e1e1e1"
              margin: { t: 30, l: 60, r: 20, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis: { title: k, gridcolor: "rgba(255,255,255,0.08)" }

      # ------------------------------------------------------ Pump cycles & totals
      - type: grid
        cards:
          - type: heading
            heading: Pump cycles & totals
            heading_style: title
            icon: mdi:pump

          - type: entities
            title: Last pump cycle
            entities:
              - entity: sensor.imbrr_last_pump_cycle_gpm
                icon: mdi:speedometer
              - entity: sensor.imbrr_last_pump_cycle_gallons
                icon: mdi:water
              - entity: sensor.imbrr_last_pump_cycle_duration
                icon: mdi:timer-outline
              - entity: sensor.imbrr_last_pump_cycle_start_psi
                icon: mdi:gauge-low
              - entity: sensor.imbrr_last_pump_cycle_stop_psi
                icon: mdi:gauge-full

          - type: entities
            title: Totals & details
            entities:
              - entity: sensor.imbrr_total_water
                name: Total water (lifetime)
                icon: mdi:cup-water
              - entity: sensor.imbrr_current_event_water
                icon: mdi:water-plus
              - entity: sensor.imbrr_water_temperature
                icon: mdi:thermometer-water
              - entity: sensor.imbrr_outflow_rate_estimated
                name: Outflow (estimated)
                icon: mdi:water-minus
              - entity: sensor.imbrr_outflow_k
                name: Outflow model k
                icon: mdi:tune-variant
              - entity: sensor.imbrr_last_reading
                name: Last reading
                icon: mdi:clock-outline
              - entity: binary_sensor.imbrr_flow_active
                name: Flow active
                icon: mdi:water-pump

  # ===========================================================================
  # SECOND VIEW — long-term history (daily / weekly / monthly aggregates)
  #
  # Depth cards use Plotly (reversed axis); the rest use the built-in
  # Statistics Graph card. Driven by each sensor's long-term statistics:
  #   - Average depth   -> depth_to_water   (mean, with min/max band)
  #   - Water use       -> total_water      (change = consumption per period)
  #   - Avg pump rate   -> last_pump_cycle_rate (mean GPM across cycles)
  #   - Pump cycles     -> pump_cycles      (change = cycles per period)
  #
  # The Pump cycles sensor counts from when the integration was installed
  # (the release that adds it onward); it can't backfill earlier cycles.
  # ===========================================================================
  - title: Long-term
    path: well-longterm
    icon: mdi:chart-box
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Daily (last 30 days)
            heading_style: title
            icon: mdi:calendar-today
          # Depth as a stepped line (held flat across each period, not
          # interpolated) with the min–max drawn as a shaded band, on a
          # reversed axis (0/surface at the top) like the live view. Line shape
          # "hv" keeps each period's value constant so the band and line align.
          - type: custom:plotly-graph
            title: Daily average depth (min–max band)
            hours_to_show: 720
            refresh_interval: 3600
            entities:
              - entity: sensor.imbrr_depth_to_water
                name: Max
                statistic: max
                period: day
                showlegend: false
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Daily range
                statistic: min
                period: day
                fill: tonexty
                fillcolor: "rgba(78,115,223,0.18)"
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Average
                statistic: mean
                period: day
                line: { color: "#4e73df", width: 2, shape: hv }
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font: { color: "#e1e1e1" }
              margin: { t: 30, l: 52, r: 20, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis:
                title: Depth
                autorange: reversed
                gridcolor: "rgba(255,255,255,0.08)"
          - type: statistics-graph
            title: Daily water use
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types:
              - change
            entities:
              - sensor.imbrr_total_water
          - type: statistics-graph
            title: Daily average pump rate
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types:
              - mean
            entities:
              - sensor.imbrr_last_pump_cycle_gpm
          - type: statistics-graph
            title: Daily pump cycles
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types:
              - change
            entities:
              - sensor.imbrr_pump_cycles

      - type: grid
        cards:
          - type: heading
            heading: Weekly (last ~6 months)
            heading_style: title
            icon: mdi:calendar-week
          - type: custom:plotly-graph
            title: Weekly average depth (min–max band)
            hours_to_show: 4320
            refresh_interval: 3600
            entities:
              - entity: sensor.imbrr_depth_to_water
                name: Max
                statistic: max
                period: week
                showlegend: false
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Weekly range
                statistic: min
                period: week
                fill: tonexty
                fillcolor: "rgba(78,115,223,0.18)"
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Average
                statistic: mean
                period: week
                line: { color: "#4e73df", width: 2, shape: hv }
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font: { color: "#e1e1e1" }
              margin: { t: 30, l: 52, r: 20, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis:
                title: Depth
                autorange: reversed
                gridcolor: "rgba(255,255,255,0.08)"
          - type: statistics-graph
            title: Weekly water use
            chart_type: bar
            period: week
            days_to_show: 180
            stat_types:
              - change
            entities:
              - sensor.imbrr_total_water
          - type: statistics-graph
            title: Weekly average pump rate
            chart_type: bar
            period: week
            days_to_show: 180
            stat_types:
              - mean
            entities:
              - sensor.imbrr_last_pump_cycle_gpm
          - type: statistics-graph
            title: Weekly pump cycles
            chart_type: bar
            period: week
            days_to_show: 180
            stat_types:
              - change
            entities:
              - sensor.imbrr_pump_cycles

      - type: grid
        cards:
          - type: heading
            heading: Monthly (last year)
            heading_style: title
            icon: mdi:calendar-month
          - type: custom:plotly-graph
            title: Monthly average depth (min–max band)
            hours_to_show: 8760
            refresh_interval: 3600
            entities:
              - entity: sensor.imbrr_depth_to_water
                name: Max
                statistic: max
                period: month
                showlegend: false
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Monthly range
                statistic: min
                period: month
                fill: tonexty
                fillcolor: "rgba(78,115,223,0.18)"
                line: { width: 0, shape: hv }
              - entity: sensor.imbrr_depth_to_water
                name: Average
                statistic: mean
                period: month
                line: { color: "#4e73df", width: 2, shape: hv }
            layout:
              paper_bgcolor: "rgba(0,0,0,0)"
              plot_bgcolor: "rgba(0,0,0,0)"
              font: { color: "#e1e1e1" }
              margin: { t: 30, l: 52, r: 20, b: 40 }
              legend: { orientation: h, y: 1.15 }
              xaxis: { gridcolor: "rgba(255,255,255,0.08)" }
              yaxis:
                title: Depth
                autorange: reversed
                gridcolor: "rgba(255,255,255,0.08)"
          - type: statistics-graph
            title: Monthly water use
            chart_type: bar
            period: month
            days_to_show: 365
            stat_types:
              - change
            entities:
              - sensor.imbrr_total_water
          - type: statistics-graph
            title: Monthly average pump rate
            chart_type: bar
            period: month
            days_to_show: 365
            stat_types:
              - mean
            entities:
              - sensor.imbrr_last_pump_cycle_gpm
          - type: statistics-graph
            title: Monthly pump cycles
            chart_type: bar
            period: month
            days_to_show: 365
            stat_types:
              - change
            entities:
              - sensor.imbrr_pump_cycles
