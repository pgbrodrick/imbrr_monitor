name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Attach integration zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release asset
        run: |
          cd custom_components/imbrr
          zip -r ../../imbrr.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: imbrr.zip
